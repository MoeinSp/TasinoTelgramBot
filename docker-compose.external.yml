# ─────────────────────────────────────────────────────────────────────────────
# وقتی پروژه دیگه‌ات از همین VPS postgres و redis داره
# اجرا: docker compose -f docker-compose.yml -f docker-compose.external.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
services:

  db:
    deploy:
      replicas: 0

  redis:
    deploy:
      replicas: 0

  migrate:
    depends_on: {}
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_REDIS_URL: ${BOT_REDIS_URL}

  bot:
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_REDIS_URL: ${BOT_REDIS_URL}
