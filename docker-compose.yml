x-bot-image: &bot-image
  image: tasino-bot:deps
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/app

services:

  db:
    image: postgres:15-alpine
    container_name: tasino_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasino_db
      POSTGRES_USER: tasino
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      postgres
        -c shared_buffers=32MB
        -c effective_cache_size=128MB
        -c work_mem=2MB
        -c maintenance_work_mem=16MB
        -c max_connections=15
        -c checkpoint_completion_target=0.9
        -c wal_buffers=4MB
        -c synchronous_commit=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 80m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasino -d tasino_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tasino_redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 30mb
        --maxmemory-policy allkeys-lru
        --save ""
        --loglevel warning
        --hz 5
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 40m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # فقط دستی: docker compose --profile tools run --rm migrate
  migrate:
    <<: *bot-image
    profiles: ["tools"]
    container_name: tasino_migrate
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://tasino:${DB_PASSWORD}@db:5432/tasino_db
      BOT_REDIS_URL: redis://redis:6379/2
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "/entrypoint.sh", "migrate-only"]
    restart: "no"

  bot:
    <<: *bot-image
    container_name: tasino_bot
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://tasino:${DB_PASSWORD}@db:5432/tasino_db
      BOT_REDIS_URL: redis://redis:6379/2
      SKIP_MIGRATE: "1"
      SKIP_COLLECTSTATIC: "1"
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8001}:8000"
      - "127.0.0.1:${WEBHOOK_HOST_PORT:-8443}:8443"
    deploy:
      resources:
        limits:
          memory: 320m
        reservations:
          memory: 80m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres_data:
  redis_data:
