# کپی روی سرور:
#   sudo cp docker/nginx-tasino.spayerx.ir.conf /etc/nginx/sites-available/tasino.spayerx.ir
#   sudo ln -sf /etc/nginx/sites-available/tasino.spayerx.ir /etc/nginx/sites-enabled/
# SSL:
#   sudo certbot --nginx -d tasino.spayerx.ir
#   sudo nginx -t && sudo systemctl reload nginx
#
# پورت‌های Docker روی localhost:
#   8001 = Django admin / static
#   8443 = Telegram webhook

upstream tasino_django {
    server 127.0.0.1:8001;
    keepalive 8;
}

upstream tasino_webhook {
    server 127.0.0.1:8443;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name tasino.spayerx.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tasino.spayerx.ir;

    ssl_certificate     /etc/letsencrypt/live/tasino.spayerx.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasino.spayerx.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # بکاپ دامپ تا ۵۱۲ مگ
    client_max_body_size 512m;

    # وب‌هوک تلگرام — قبل از location / باشد
    location /webhook {
        proxy_pass http://tasino_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass http://tasino_django;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    location / {
        proxy_pass http://tasino_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
