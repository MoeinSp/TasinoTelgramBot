# tasino2.spayerx.ir — کپی روی سرور:
#   apt install -y nginx certbot python3-certbot-nginx
#   cp docker/nginx-tasino2.spayerx.ir.conf /etc/nginx/sites-available/tasino2.spayerx.ir
#   ln -sf /etc/nginx/sites-available/tasino2.spayerx.ir /etc/nginx/sites-enabled/
#   certbot --nginx -d tasino2.spayerx.ir
#   nginx -t && systemctl reload nginx
#
# پورت‌های Docker (localhost):
#   8001 = admin
#   8443 = webhook

upstream tasino2_django {
    server 127.0.0.1:8001;
    keepalive 8;
}

upstream tasino2_webhook {
    server 127.0.0.1:8443;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name tasino2.spayerx.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tasino2.spayerx.ir;

    ssl_certificate     /etc/letsencrypt/live/tasino2.spayerx.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tasino2.spayerx.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 512m;

    location /webhook {
        proxy_pass http://tasino2_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass http://tasino2_django;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    location / {
        proxy_pass http://tasino2_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
