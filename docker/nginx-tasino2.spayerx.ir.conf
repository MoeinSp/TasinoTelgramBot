# tasino2.spayerx.ir — فقط HTTP (قبل از SSL)
# بعد از کپی:
#   certbot --nginx -d tasino2.spayerx.ir --redirect
# certbot خودش بلاک HTTPS را اضافه می‌کند.

upstream tasino2_django {
    server 127.0.0.1:8001;
    keepalive 8;
}

upstream tasino2_webhook {
    server 127.0.0.1:8443;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name tasino2.spayerx.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /webhook {
        proxy_pass http://tasino2_webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location /static/ {
        proxy_pass http://tasino2_django;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
    }

    location / {
        proxy_pass http://tasino2_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
