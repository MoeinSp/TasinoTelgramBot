# نسخه داخل Docker (اختیاری) — روی VPS معمولاً از nginx-tasino.spayerx.ir.conf روی هاست استفاده کن.

upstream tasino_bot {
    server bot:8000;
}

upstream tasino_webhook {
    server bot:8443;
}

server {
    listen 80;
    server_name tasino.spayerx.ir;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name tasino.spayerx.ir;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 512m;

    location /webhook {
        proxy_pass         http://tasino_webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
    }

    location /static/ {
        proxy_pass         http://tasino_bot;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires 30d;
    }

    location / {
        proxy_pass         http://tasino_bot;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
    }
}
